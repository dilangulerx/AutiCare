- task_name: analyze_logs_task
  description: "{child_name} adlı çocuğun günlük davranış loglarını analiz et ve önemli trendleri belirle. Loglar: {logs_text}"
  expected_output: Belirlenen trendler, kalıplar ve önemli gözlemlerin özeti.
  agent: BehavioralAnalystAgent

- task_name: detect_anomalies_task
  description: "{child_name} adlı çocuğun verilerinde anormal sapmaları tespit et. Loglar: {logs_text}. UYARI: ile başla anomali varsa, NORMAL: ile başla yoksa."
  expected_output: Tespit edilen anomaliler ve potansiyel nedenleri.
  agent: AnomalyDetectorAgent

- task_name: generate_recommendations_task
  description: "{child_name} için davranışsal analiz sonuçlarına dayanarak kişiselleştirilmiş aktivite ve terapi önerileri sun. Türkçe yaz."
  expected_output: Çocuğa özel aktivite ve terapi önerilerinin listesi.
  agent: TherapyAdvisorAgent

- task_name: compile_weekly_report_task
  description: "{child_name} için haftalık davranışsal raporu Türkçe, sıcak ve destekleyici bir dille derle. Genel değerlendirme, öne çıkan gelişim, dikkat alanı ve 3 pratik öneri içermeli. Tıbbi teşhis koyma."
  expected_output: Kapsamlı haftalık davranışsal rapor metni.
  agent: ReportGeneratorAgent

- task_name: handle_chat_query_task
  description: "Ebeveynin sorusu: {query}. {child_name} hakkında bilinen veriler: {logs_text}. Bu soruyu Türkçe, empatik ve destekleyici bir dille yanıtla. Tıbbi teşhis koyma."
  expected_output: Ebeveynin sorusuna verilen doğal dilde Türkçe yanıt.
  agent: ConversationalAgent