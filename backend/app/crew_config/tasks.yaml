- task_name: analyze_logs_task
  description: "{child_name} adlı çocuğun günlük davranış loglarını analiz et ve önemli trendleri belirle. Loglar: {logs_text}"
  expected_output: Belirlenen trendler, kalıplar ve önemli gözlemlerin özeti.
  agent: BehavioralAnalystAgent

- task_name: detect_anomalies_task
  description: "{child_name} adlı çocuğun verilerinde anormal sapmaları tespit et. Loglar: {logs_text}. 
  UYARI: ile başla anomali varsa, NORMAL: ile başla yoksa."
  expected_output: Tespit edilen anomaliler ve potansiyel nedenleri.
  agent: AnomalyDetectorAgent

- task_name: generate_recommendations_task
  description: "{child_name} için davranışsal analiz sonuçlarına dayanarak kişiselleştirilmiş aktivite ve terapi önerileri sun. 
  Türkçe yaz."
  expected_output: Çocuğa özel aktivite ve terapi önerilerinin listesi.
  agent: TherapyAdvisorAgent

- task_name: compile_weekly_report_task
  description: "{child_name} için haftalık davranışsal raporu Türkçe, sıcak ve destekleyici bir dille derle. 
  Genel değerlendirme, öne çıkan gelişim, dikkat alanı ve 3 pratik öneri içermeli. Tıbbi teşhis koyma."
  expected_output: Kapsamlı haftalık davranışsal rapor metni.
  agent: ReportGeneratorAgent

- task_name: handle_chat_query_task
  description: "Ebeveynin sorusu: {query}. {child_name} hakkında bilinen veriler: {logs_text}. 
  Bu soruyu Türkçe, empatik ve destekleyici bir dille yanıtla. Tıbbi teşhis koyma."
  expected_output: Ebeveynin sorusuna verilen doğal dilde Türkçe yanıt.
  agent: ConversationalAgent

# ============================================================================
# YENİ GÖREVLER — Agentic AI Modernizasyonu
# ============================================================================

# NEDEN: Terapi önerilerinin güncel bilimsel kaynaklarla desteklenmesi
# güvenilirliği artırır. Bu görev, LiteratureReviewAgent'ın internet
# arama aracını kullanarak en güncel çalışmaları bulmasını sağlar.
- task_name: literature_review_task
  description: "{child_name} adlı çocuğun davranışsal profiline (Loglar: {logs_text}) uygun güncel
  otizm terapi yöntemleri, ABA terapisi, duyusal entegrasyon ve davranışsal müdahale
  yaklaşımları hakkında akademik kaynakları araştır. Arama aracını kullanarak en güncel
  makaleleri bul ve Türkçe özetle."
  expected_output: En az 3 güncel akademik kaynak referansı ile desteklenmiş terapi yöntemleri özeti.
  agent: LiteratureReviewAgent

# NEDEN: Ebeveynlere sadece veri analizi değil, pratik günlük
# yaşam stratejileri de sunmak gerekiyor.
- task_name: parent_guidance_task
  description: "{child_name} adlı çocuğun davranışsal verileri ({logs_text}) ışığında,
  ebeveynlere günlük yaşamda uygulayabilecekleri pratik stratejiler ve öneriler sun.
  Empatik ve destekleyici bir dil kullan. Tıbbi teşhis koyma.
  Ebeveynin sorusu (varsa): {query}"
  expected_output: Ebeveynlere yönelik en az 5 pratik strateji ve destekleyici mesajlar.
  agent: ParentSupportAgent

# NEDEN: Temel trend analizinin ötesinde, veriler arasındaki karmaşık
# korelasyonları (örn. uyku-saldırganlık ilişkisi) tespit etmek
# daha derinlemesine içgörü sağlar.
- task_name: deep_data_analysis_task
  description: "{child_name} adlı çocuğun davranışsal verilerini ({logs_text}) derinlemesine analiz et.
  Göz teması, iletişim skoru, saldırganlık seviyesi ve uyku saatleri arasındaki
  korelasyonları bul. Zaman serisi trendlerini ve haftalık/aylık değişimleri raporla.
  Veritabanı sorgulama aracını kullanarak geçmiş verilere eriş."
  expected_output: Detaylı istatistiksel analiz raporu, korelasyon tablosu ve trend grafikleri açıklaması.
  agent: DataAnalystAgent

# NEDEN: Arama sonuçlarını mevcut davranışsal analiz ile birleştirerek
# daha bilgiye dayalı öneriler üretmek.
- task_name: search_enhanced_recommendations_task
  description: "{child_name} için hem davranışsal analiz sonuçlarını hem de güncel
  araştırma bulgularını kullanarak zenginleştirilmiş terapi önerileri oluştur.
  Loglar: {logs_text}. Arama aracını kullanarak önerilerin bilimsel dayanağını güçlendir."
  expected_output: Bilimsel kaynaklarla desteklenmiş kişiselleştirilmiş terapi önerileri listesi.
  agent: TherapyAdvisorAgent